name: Bug report
description: Report a reproducible bug in templsite.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened vs what you expected?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands and file changes where possible.
      placeholder: |
        1. Run `...`
        2. Edit `...`
        3. Observe `...`
    validations:
      required: true
  - type: textarea
    id: minimal
    attributes:
      label: Minimal example
      description: Optional but preferred. Link a minimal repo or paste key config/content.
  - type: textarea
    id: logs
    attributes:
      label: Logs and output
      description: Paste relevant errors, stack traces, or terminal output.
      render: shell
  - type: input
    id: go_version
    attributes:
      label: Go version
      placeholder: go version go1.25.x ...
    validations:
      required: true
  - type: input
    id: templ_version
    attributes:
      label: templ version
      placeholder: templ version
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 14 / Ubuntu 24.04 / Windows 11 ...
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues before filing this.
          required: true
        - label: I can reproduce this on the latest main branch.
          required: false
