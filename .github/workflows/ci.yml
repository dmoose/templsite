name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templ components
        run: templ generate -path ./components

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templ components
        run: templ generate -path ./components

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Check go fix
        run: |
          go fix ./...
          if [ -n "$(git diff)" ]; then
            echo "go fix produced changes -- run 'go fix ./...' locally"
            git diff
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install REUSE tool
        run: pip install reuse

      - name: Check REUSE compliance
        run: reuse lint
